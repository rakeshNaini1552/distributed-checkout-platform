name: CI Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-common-events:
    name: Build common-events
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build common-events
        run: |
          cd Common-events-kafka
          mvn clean install -DskipTests

  build-spring-services:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build-common-events
    strategy:
      matrix:
        service:
          - eureka-service
          - user-service
          - order-service
          - product-service
          - inventory-service
          - GATEWAY_SERVICE
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Restore common-events from cache
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository/org/example/common-events
          key: common-events-${{ github.sha }}
      - name: Build ${{ matrix.service }}
        run: |
          cd ${{ matrix.service }}
          mvn clean package -DskipTests
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

  build-ai-service:
    name: Build ai-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          cd ai-service
          pip install -r requirements.txt
      - name: Verify ai-service starts
        run: |
          cd ai-service
          python -c "from app.routes import router; print('AI service imports OK')"
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: |
          cd frontend
          npm install
      - name: Build frontend
        run: |
          cd frontend
          npm run build