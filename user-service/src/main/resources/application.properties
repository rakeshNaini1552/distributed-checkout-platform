spring.application.name=USER-SERVICE
server.port=8081

jwt.secret=${JWT_SECRET}

management.endpoints.web.exposure.include=circuitbreakers,circuitbreakerevents,health,info,metrics
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/user_service}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.kafka.bootstrap-servers=${KAFKA_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=user-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*