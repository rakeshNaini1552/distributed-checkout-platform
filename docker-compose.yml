services:

  # ─── Infrastructure ───────────────────────────────────

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - checkout-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - checkout-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - checkout-network

  # ─── Spring Boot Services ─────────────────────────────

  eureka-service:
    build: ./eureka-service
    container_name: eureka-service
    ports:
      - "8761:8761"
    networks:
      - checkout-network

  gateway-service:
    build: ./GATEWAY_SERVICE
    container_name: gateway-service
    ports:
      - "8080:8080"
    depends_on:
      - eureka-service
    environment:
      EUREKA_URL: http://eureka-service:8761/eureka/
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - checkout-network

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - kafka
      - eureka-service
    environment:
      EUREKA_URL: http://eureka-service:8761/eureka/
      DB_URL: jdbc:postgresql://postgres:5432/user_service
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      KAFKA_SERVERS: kafka:9092
    networks:
      - checkout-network

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8082:8082"
    depends_on:
      - postgres
      - kafka
      - eureka-service
    environment:
      EUREKA_URL: http://eureka-service:8761/eureka/
      DB_URL: jdbc:postgresql://postgres:5432/order_service
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      KAFKA_SERVERS: kafka:9092
      AI_SERVICE_URL: http://ai-service:8085
    networks:
      - checkout-network

  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "8084:8084"
    depends_on:
      - postgres
      - eureka-service
    environment:
      EUREKA_URL: http://eureka-service:8761/eureka/
      DB_URL: jdbc:postgresql://postgres:5432/product_service
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD}
    networks:
      - checkout-network

  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    ports:
      - "8083:8083"
    depends_on:
      - postgres
      - kafka
      - eureka-service
    environment:
      EUREKA_URL: http://eureka-service:8761/eureka/
      DB_URL: jdbc:postgresql://postgres:5432/inventory_service
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_SERVERS: kafka:9092
    networks:
      - checkout-network

  ai-service:
    build: ./ai-service
    container_name: ai-service
    ports:
      - "8085:8085"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      AI_SERVICE_PORT: 8085
    networks:
      - checkout-network

volumes:
  postgres_data:

networks:
  checkout-network:
    driver: bridge